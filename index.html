<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickScan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1a1611; --ink2: #4a4035; --ink3: #8a7a6a;
  --paper: #faf7f2; --paper2: #f2ede4; --paper3: #e8e0d0;
  --gold: #c9933a; --goldl: #f0d9a8;
  --b: rgba(90,70,40,0.15); --bs: rgba(90,70,40,0.3);
}
body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); height: 100vh; overflow: hidden; }
.shell { display: flex; flex-direction: column; height: 100vh; position: relative; }
header { background: var(--ink); height: 52px; padding: 0 1.25rem; display: flex; align-items: center; gap: 10px; border-bottom: 3px solid var(--gold); flex-shrink: 0; }
.logo { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--paper); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.badge { width: 22px; height: 22px; border: 2px solid var(--gold); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--gold); font-weight: 700; }
.search-wrap { flex: 1; max-width: 240px; }
.search-wrap input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(201,147,58,0.4); border-radius: 6px; padding: 6px 10px; font-size: 13px; color: var(--paper); font-family: 'DM Sans', sans-serif; outline: none; }
.search-wrap input::placeholder { color: rgba(250,247,242,0.4); }
.search-wrap input:focus { border-color: var(--gold); }
.key-wrap { display: flex; align-items: center; gap: 6px; }
.key-wrap label { font-size: 10px; color: var(--goldl); white-space: nowrap; letter-spacing: 0.04em; }
.key-wrap input { background: rgba(255,255,255,0.08); border: 1px solid rgba(201,147,58,0.4); border-radius: 6px; padding: 5px 8px; font-size: 12px; color: var(--paper); font-family: monospace; outline: none; width: 200px; }
.key-wrap input:focus { border-color: var(--gold); }
.key-wrap input::placeholder { color: rgba(250,247,242,0.3); font-family: 'DM Sans',sans-serif; }
.key-status { font-size: 10px; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
.key-status.ok { background: rgba(30,120,60,0.3); color: #7fcf9a; }
.key-status.no { background: rgba(180,60,40,0.3); color: #f5a090; }
.hstats { display: flex; gap: 14px; margin-left: auto; }
.sp { font-size: 11px; color: var(--paper3); letter-spacing: 0.04em; }
.sp span { color: var(--gold); font-weight: 500; }
.body { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 210px; background: var(--paper2); border-right: 1px solid var(--b); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
.slabel { font-size: 9px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); padding: 12px 14px 6px; }
.scanzone { margin: 0 10px 12px; border: 1.5px dashed var(--gold); border-radius: 8px; padding: 14px 10px; text-align: center; cursor: pointer; position: relative; transition: background 0.2s; }
.scanzone:hover { background: rgba(201,147,58,0.07); }
.scanzone input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
.sz-icon { font-size: 22px; display: block; margin-bottom: 6px; }
.sz-title { font-family: 'Playfair Display', serif; font-size: 13px; font-weight: 500; color: var(--ink); }
.sz-sub { font-size: 10px; color: var(--ink3); line-height: 1.4; margin-top: 2px; }
.yitem { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; }
.yitem:hover { background: rgba(201,147,58,0.08); }
.yitem.active { border-left-color: var(--gold); background: rgba(201,147,58,0.1); }
.ylabel { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 500; color: var(--ink); }
.ybadge { font-size: 10px; background: var(--paper3); color: var(--ink2); padding: 1px 7px; border-radius: 20px; font-weight: 500; }
.yitem.active .ybadge { background: var(--gold); color: white; }
.main { flex: 1; overflow-y: auto; padding: 1.25rem; }
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; text-align: center; }
.empty-icon { font-size: 48px; opacity: 0.4; }
.empty-t { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--ink2); }
.empty-s { font-size: 13px; color: var(--ink3); max-width: 240px; line-height: 1.6; }
.ysec { margin-bottom: 2rem; }
.yhead { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.yhead::after { content: ''; flex: 1; height: 1px; background: var(--b); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
.card { background: white; border: 1px solid var(--b); border-radius: 6px; overflow: hidden; cursor: pointer; transition: all 0.18s; }
.card:hover, .card.sel { border-color: var(--gold); }
.card.sel { box-shadow: 0 0 0 2px var(--gold); }
.cthumb { height: 120px; background: var(--paper2); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; border-bottom: 1px solid var(--b); }
.cthumb img { width: 100%; height: 100%; object-fit: cover; }
.cph { font-size: 34px; opacity: 0.5; }
.cbadge { position: absolute; top: 6px; right: 6px; background: var(--ink); color: var(--goldl); font-size: 9px; font-weight: 500; padding: 2px 5px; border-radius: 3px; }
.cai { position: absolute; bottom: 6px; left: 6px; background: var(--gold); color: white; font-size: 8px; font-weight: 500; padding: 2px 5px; border-radius: 3px; }
.cinfo { padding: 8px 10px; }
.cname { font-size: 12px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cmeta { font-size: 10px; color: var(--ink3); margin-top: 1px; }
.cacts { display: flex; gap: 4px; padding: 6px 10px; border-top: 1px solid var(--b); background: var(--paper2); }
.cbtn { flex: 1; font-size: 10px; font-weight: 500; padding: 4px 6px; border-radius: 4px; cursor: pointer; border: 1px solid var(--bs); background: white; color: var(--ink2); font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
.cbtn:hover { background: var(--gold); color: white; border-color: var(--gold); }
.cbtn.pr { background: var(--ink); color: var(--goldl); border-color: var(--ink); }
.cbtn.pr:hover { background: var(--gold); border-color: var(--gold); color: white; }
.detail { width: 360px; background: white; border-left: 1px solid var(--b); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
.detail.hidden { display: none; }
.dhead { padding: 12px 14px; border-bottom: 1px solid var(--b); display: flex; align-items: center; gap: 8px; }
.dclose { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--ink3); margin-left: auto; padding: 2px 6px; border-radius: 4px; }
.dclose:hover { background: var(--paper2); }
.dtitle { font-size: 13px; font-weight: 500; color: var(--ink); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dtabs { display: flex; border-bottom: 1px solid var(--b); background: var(--paper2); }
.dtab { flex: 1; padding: 8px 4px; text-align: center; font-size: 11px; font-weight: 500; color: var(--ink3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.dtab.active { color: var(--gold); border-bottom-color: var(--gold); background: white; }
.dpanel { flex: 1; overflow-y: auto; padding: 14px; }
.dpanel.hidden { display: none; }
.sum-block { background: var(--paper2); border-radius: 6px; padding: 12px; margin-bottom: 12px; }
.sum-label { font-size: 9px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 6px; }
.sum-text { font-size: 12px; color: var(--ink2); line-height: 1.6; }
.kv-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--b); font-size: 12px; }
.kv-row:last-child { border: none; }
.kv-k { color: var(--ink3); }
.kv-v { color: var(--ink); font-weight: 500; }
.ocr-text { font-size: 11px; color: var(--ink2); line-height: 1.7; white-space: pre-wrap; font-family: monospace; background: var(--paper2); border-radius: 6px; padding: 10px; }
.chat-wrap { display: flex; flex-direction: column; height: 100%; }
.chat-msgs { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-bottom: 8px; }
.msg { max-width: 90%; padding: 8px 10px; border-radius: 8px; font-size: 12px; line-height: 1.5; }
.msg.user { background: var(--ink); color: var(--goldl); align-self: flex-end; border-bottom-right-radius: 2px; }
.msg.ai { background: var(--paper2); color: var(--ink2); align-self: flex-start; border-bottom-left-radius: 2px; }
.msg.typing { color: var(--ink3); font-style: italic; }
.chat-input { display: flex; gap: 6px; padding-top: 8px; border-top: 1px solid var(--b); margin-top: auto; }
.chat-input textarea { flex: 1; border: 1px solid var(--b); border-radius: 6px; padding: 6px 8px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--ink); background: var(--paper2); resize: none; height: 40px; outline: none; }
.chat-input textarea:focus { border-color: var(--gold); }
.chat-send { background: var(--gold); color: white; border: none; border-radius: 6px; padding: 0 12px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.chat-send:hover { background: #b07e2a; }
.proc-bar { display: none; position: fixed; inset: 0; background: rgba(26,22,17,0.65); z-index: 50; align-items: center; justify-content: center; }
.proc-bar.show { display: flex; }
.proc-box { background: var(--paper); border: 2px solid var(--gold); border-radius: 10px; padding: 1.5rem 2rem; text-align: center; min-width: 240px; }
.spin { width: 32px; height: 32px; border: 3px solid var(--paper3); border-top-color: var(--gold); border-radius: 50%; animation: sp 0.8s linear infinite; margin: 0 auto 10px; }
@keyframes sp { to { transform: rotate(360deg); } }
.pt { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 500; color: var(--ink); }
.ps { font-size: 11px; color: var(--ink3); margin-top: 4px; }
.toast-el { position: fixed; bottom: 16px; right: 16px; background: var(--ink); color: var(--paper); padding: 8px 14px; border-radius: 6px; border-left: 3px solid var(--gold); font-size: 12px; z-index: 100; transform: translateY(60px); opacity: 0; transition: all 0.3s; }
.toast-el.show { transform: translateY(0); opacity: 1; }
.ai-badge-detail { display: inline-block; background: rgba(201,147,58,0.15); color: #7a5a1a; font-size: 9px; font-weight: 500; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.04em; margin-bottom: 8px; }
.chip { display: inline-flex; align-items: center; gap: 4px; background: var(--paper3); border-radius: 12px; padding: 3px 8px; font-size: 10px; color: var(--ink2); margin: 2px; }
.no-key-notice { background: rgba(180,100,40,0.12); border: 1px solid rgba(180,100,40,0.3); border-radius: 6px; padding: 10px 12px; font-size: 12px; color: var(--ink2); line-height: 1.5; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo"><div class="badge">QS</div>QuickScan</div>
    <div class="search-wrap"><input type="text" id="search" placeholder="Search documents…"></div>
    <div class="key-wrap">
      <label>API KEY</label>
      <input type="password" id="apikey" placeholder="test" autocomplete="off">
      <span class="key-status no" id="key-status">No key</span>
    </div>
    <div class="hstats">
      <span class="sp">Docs: <span id="tdocs">0</span></span>
      <span class="sp">Years: <span id="tyears">0</span></span>
    </div>
  </header>

  <div class="body">
    <aside class="sidebar">
      <div class="slabel">Scan</div>
      <label class="scanzone">
        <input type="file" id="finput" accept="image/*,.pdf" multiple>
        <span class="sz-icon">📄</span>
        <div class="sz-title">Upload & Scan</div>
        <div class="sz-sub">JPG, PNG or PDF<br>AI reads + summarizes</div>
      </label>
      <div class="slabel">Archive</div>
      <div id="ylist">
        <div class="yitem active" data-y="all">
          <span class="ylabel" style="font-size:13px;">All Documents</span>
          <span class="ybadge" id="ac">0</span>
        </div>
      </div>
    </aside>

    <div class="main" id="main">
      <div class="empty" id="empty">
        <div class="empty-icon">📂</div>
        <div class="empty-t">Archive is empty</div>
        <div class="empty-s">Paste your Anthropic API key above, then upload a document to get started.</div>
      </div>
    </div>

    <div class="detail hidden" id="detail">
      <div class="dhead">
        <div class="dtitle" id="dtitle">Document</div>
        <button class="dclose" id="dclose">✕</button>
      </div>
      <div class="dtabs">
        <div class="dtab active" data-tab="sum">Summary</div>
        <div class="dtab" data-tab="txt">Text</div>
        <div class="dtab" data-tab="chat">Chat</div>
      </div>
      <div class="dpanel" id="pan-sum"><div id="sum-content"></div></div>
      <div class="dpanel hidden" id="pan-txt"><div id="txt-content"></div></div>
      <div class="dpanel hidden" id="pan-chat" style="display:none;">
        <div class="chat-wrap">
          <div class="chat-msgs" id="chat-msgs"></div>
          <div class="chat-input">
            <textarea id="chat-in" placeholder="Ask about this document…"></textarea>
            <button class="chat-send" id="chat-send">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="proc-bar" id="proc">
    <div class="proc-box">
      <div class="spin"></div>
      <div class="pt" id="pt">Scanning…</div>
      <div class="ps" id="ps">Please wait</div>
    </div>
  </div>
  <div class="toast-el" id="toast"></div>
</div>

<script>
const { jsPDF } = window.jspdf;
const state = { docs: [], activeYear: 'all', selDoc: null, activeTab: 'sum', chatHistory: {} };

const finput   = document.getElementById('finput');
const mainEl   = document.getElementById('main');
const emptyEl  = document.getElementById('empty');
const ylist    = document.getElementById('ylist');
const detail   = document.getElementById('detail');
const dtitle   = document.getElementById('dtitle');
const proc     = document.getElementById('proc');
const pt       = document.getElementById('pt');
const ps       = document.getElementById('ps');
const searchEl = document.getElementById('search');
const apikeyEl = document.getElementById('apikey');
const keyStatus = document.getElementById('key-status');

function getKey() { return apikeyEl.value.trim(); }

apikeyEl.addEventListener('input', () => {
  const k = getKey();
  if (k.startsWith('sk-ant-') && k.length > 20) {
    keyStatus.textContent = 'Key set ✓';
    keyStatus.className = 'key-status ok';
  } else if (k.length > 0) {
    keyStatus.textContent = 'Invalid';
    keyStatus.className = 'key-status no';
  } else {
    keyStatus.textContent = 'No key';
    keyStatus.className = 'key-status no';
  }
});

finput.addEventListener('change', async e => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  finput.value = '';
  if (!getKey()) { toast('Please enter your Anthropic API key first'); return; }
  for (const f of files) await processFile(f);
});

searchEl.addEventListener('input', () => renderMain());

document.getElementById('dclose').addEventListener('click', () => {
  state.selDoc = null;
  detail.classList.add('hidden');
  renderMain();
});

document.querySelectorAll('.dtab').forEach(tab => {
  tab.addEventListener('click', () => {
    const t = tab.dataset.tab;
    state.activeTab = t;
    document.querySelectorAll('.dtab').forEach(x => x.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.dpanel').forEach(p => { p.classList.add('hidden'); p.style.display = 'none'; });
    const pan = document.getElementById('pan-' + t);
    pan.classList.remove('hidden');
    pan.style.display = t === 'chat' ? 'flex' : 'block';
    if (t === 'chat') pan.style.flexDirection = 'column';
  });
});

async function callClaude(messages, maxTokens = 1200) {
  const key = getKey();
  if (!key) throw new Error('No API key');
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: maxTokens, messages })
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${r.status}`);
  }
  const d = await r.json();
  return d.content?.find(b => b.type === 'text')?.text || '';
}

async function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function processFile(file) {
  showProc('Reading document…', 'Sending to AI for analysis');
  try {
    const b64full = await toBase64(file);
    const isImage = file.type.startsWith('image/');
    const b64 = b64full.split(',')[1];

    showProc('Extracting text & metadata…', 'Claude is reading the document');

    let year = 'Unknown', docType = 'Document', extractedText = '', summary = '', keyFacts = [];

    try {
      const contentBlock = isImage
        ? { type: 'image', source: { type: 'base64', media_type: file.type, data: b64 } }
        : { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: b64 } };

      const raw = await callClaude([{
        role: 'user',
        content: [
          contentBlock,
          { type: 'text', text: `Analyze this document carefully and respond ONLY with a JSON object (no markdown, no extra text):
{
  "year": "detected year or Unknown",
  "type": "document type (Invoice, Receipt, Letter, Contract, Tax Form, Report, ID, Certificate, etc.)",
  "extractedText": "all readable text from the document verbatim, preserving structure",
  "summary": "2-3 sentence plain English summary of what this document is, who it involves, and key details",
  "keyFacts": ["fact 1", "fact 2", "fact 3"]
}` }
        ]
      }], 1500);

      const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
      year        = parsed.year || 'Unknown';
      docType     = parsed.type || 'Document';
      extractedText = parsed.extractedText || '';
      summary     = parsed.summary || '';
      keyFacts    = parsed.keyFacts || [];
    } catch (err) {
      console.warn('AI analysis failed:', err.message);
      toast('AI error: ' + err.message);
    }

    showProc('Generating PDF…', 'Converting to archival format');

    let pdfUrl = b64full;
    if (isImage) {
      const img = new Image();
      img.src = b64full;
      await new Promise(r => img.onload = r);
      const w = img.naturalWidth || 800, h = img.naturalHeight || 1100;
      const pdf = new jsPDF({ orientation: w > h ? 'landscape' : 'portrait', unit: 'px', format: [w, h] });
      pdf.addImage(b64full, file.type.includes('png') ? 'PNG' : 'JPEG', 0, 0, w, h);
      pdfUrl = pdf.output('datauristring');
    }

    const doc = {
      id: Date.now() + Math.random(),
      name: file.name.replace(/\.[^.]+$/, ''),
      type: docType, year, pdfUrl,
      thumbUrl: isImage ? b64full : null,
      extractedText, summary, keyFacts,
      addedAt: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
    };

    state.docs.push(doc);
    state.chatHistory[doc.id] = [];
    renderAll();
    toast(`Filed under ${year}`);
  } catch (err) {
    toast('Error: ' + err.message);
    console.error(err);
  } finally { hideProc(); }
}

function getYears() {
  const m = {};
  state.docs.forEach(d => { m[d.year] = (m[d.year] || 0) + 1; });
  return Object.entries(m).sort((a, b) => {
    if (a[0] === 'Unknown') return 1;
    if (b[0] === 'Unknown') return -1;
    return parseInt(b[0]) - parseInt(a[0]);
  });
}

function filteredDocs() {
  const q = searchEl.value.trim().toLowerCase();
  let docs = state.activeYear === 'all' ? state.docs : state.docs.filter(d => d.year === state.activeYear);
  if (q) docs = docs.filter(d => d.name.toLowerCase().includes(q) || d.type.toLowerCase().includes(q) || d.year.includes(q));
  return docs;
}

function renderAll() {
  document.getElementById('tdocs').textContent = state.docs.length;
  document.getElementById('tyears').textContent = getYears().filter(y => y[0] !== 'Unknown').length;
  document.getElementById('ac').textContent = state.docs.length;

  ylist.querySelectorAll('[data-y]:not([data-y="all"])').forEach(e => e.remove());
  getYears().forEach(([yr, cnt]) => {
    const el = document.createElement('div');
    el.className = 'yitem' + (state.activeYear === yr ? ' active' : '');
    el.dataset.y = yr;
    el.innerHTML = `<span class="ylabel">${yr}</span><span class="ybadge">${cnt}</span>`;
    el.addEventListener('click', () => { state.activeYear = yr; renderAll(); });
    ylist.appendChild(el);
  });
  ylist.querySelector('[data-y="all"]').className = 'yitem' + (state.activeYear === 'all' ? ' active' : '');
  ylist.querySelector('[data-y="all"]').onclick = () => { state.activeYear = 'all'; renderAll(); };
  renderMain();
  if (state.selDoc) renderDetail(state.selDoc);
}

function renderMain() {
  const docs = filteredDocs();
  if (!docs.length) {
    mainEl.innerHTML = '';
    mainEl.appendChild(emptyEl);
    emptyEl.style.display = 'flex';
    return;
  }
  let html = '';
  if (state.activeYear === 'all') {
    const q = searchEl.value.trim().toLowerCase();
    getYears().forEach(([yr]) => {
      let ydocs = state.docs.filter(d => d.year === yr);
      if (q) ydocs = ydocs.filter(d => d.name.toLowerCase().includes(q) || d.type.toLowerCase().includes(q));
      if (!ydocs.length) return;
      html += `<div class="ysec"><div class="yhead">${yr}</div><div class="grid">${ydocs.map(cardHTML).join('')}</div></div>`;
    });
  } else {
    html = `<div class="grid">${docs.map(cardHTML).join('')}</div>`;
  }
  mainEl.innerHTML = html;

  mainEl.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = parseFloat(btn.dataset.id);
      const doc = state.docs.find(d => d.id === id);
      if (!doc) return;
      if (btn.dataset.action === 'dl') {
        const a = document.createElement('a');
        a.href = doc.pdfUrl; a.download = `${doc.name}_${doc.year}.pdf`; a.click();
      } else if (btn.dataset.action === 'rm') {
        if (state.selDoc?.id === id) { state.selDoc = null; detail.classList.add('hidden'); }
        state.docs = state.docs.filter(d => d.id !== id);
        if (state.activeYear !== 'all' && !state.docs.find(d => d.year === state.activeYear)) state.activeYear = 'all';
        renderAll(); toast('Document removed');
      }
    });
  });

  mainEl.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const id = parseFloat(card.dataset.id);
      const doc = state.docs.find(d => d.id === id);
      if (!doc) return;
      state.selDoc = doc;
      mainEl.querySelectorAll('.card').forEach(c => c.classList.remove('sel'));
      card.classList.add('sel');
      detail.classList.remove('hidden');
      renderDetail(doc);
    });
  });
}

function cardHTML(doc) {
  const sel = state.selDoc?.id === doc.id;
  const thumb = doc.thumbUrl ? `<img src="${doc.thumbUrl}" alt="">` : `<span class="cph">📄</span>`;
  const aiTag = doc.summary ? `<span class="cai">AI ✓</span>` : '';
  return `<div class="card${sel ? ' sel' : ''}" data-id="${doc.id}">
    <div class="cthumb">${thumb}<span class="cbadge">${doc.type}</span>${aiTag}</div>
    <div class="cinfo"><div class="cname" title="${doc.name}">${doc.name}</div><div class="cmeta">${doc.addedAt} · ${doc.year}</div></div>
    <div class="cacts">
      <button class="cbtn pr" data-action="dl" data-id="${doc.id}">Download</button>
      <button class="cbtn" data-action="rm" data-id="${doc.id}">Remove</button>
    </div>
  </div>`;
}

function renderDetail(doc) {
  dtitle.textContent = doc.name;
  document.getElementById('sum-content').innerHTML = `
    <span class="ai-badge-detail">AI Summary</span>
    <div class="sum-block"><div class="sum-label">Overview</div><div class="sum-text">${doc.summary || 'No summary available.'}</div></div>
    <div class="sum-block">
      <div class="sum-label">Document Details</div>
      <div class="kv-row"><span class="kv-k">Type</span><span class="kv-v">${doc.type}</span></div>
      <div class="kv-row"><span class="kv-k">Year</span><span class="kv-v">${doc.year}</span></div>
      <div class="kv-row"><span class="kv-k">Added</span><span class="kv-v">${doc.addedAt}</span></div>
    </div>
    ${doc.keyFacts?.length ? `<div class="sum-block"><div class="sum-label">Key Facts</div><div style="margin-top:4px;">${doc.keyFacts.map(f => `<div class="chip">• ${f}</div>`).join('')}</div></div>` : ''}
  `;
  document.getElementById('txt-content').innerHTML = doc.extractedText
    ? `<div class="sum-label" style="margin-bottom:6px;">Extracted Text</div><div class="ocr-text">${doc.extractedText}</div>`
    : `<div style="color:var(--ink3);font-size:13px;text-align:center;padding:2rem;">No text extracted.</div>`;
  renderChat(doc);
}

function renderChat(doc) {
  const msgs = document.getElementById('chat-msgs');
  const history = state.chatHistory[doc.id] || [];
  msgs.innerHTML = `<div class="msg ai">Hi! I've read this document. Ask me anything about it.</div>` +
    history.map(m => `<div class="msg ${m.role}">${m.content}</div>`).join('');
  msgs.scrollTop = msgs.scrollHeight;

  const sendBtn = document.getElementById('chat-send');
  const chatIn  = document.getElementById('chat-in');
  const newSend = sendBtn.cloneNode(true);
  const newIn   = chatIn.cloneNode(true);
  sendBtn.parentNode.replaceChild(newSend, sendBtn);
  chatIn.parentNode.replaceChild(newIn, chatIn);

  newIn.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(doc); } });
  newSend.addEventListener('click', () => sendChat(doc));
}

async function sendChat(doc) {
  const input = document.getElementById('chat-in');
  const q = input.value.trim();
  if (!q) return;
  if (!getKey()) { toast('Enter your API key first'); return; }
  input.value = '';

  const history = state.chatHistory[doc.id] = state.chatHistory[doc.id] || [];
  history.push({ role: 'user', content: q });

  const msgs = document.getElementById('chat-msgs');
  msgs.innerHTML += `<div class="msg user">${q}</div><div class="msg ai typing" id="typing-dot">Thinking…</div>`;
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const context = `You are a helpful assistant analyzing a document.
Name: ${doc.name}
Type: ${doc.type}
Year: ${doc.year}
Extracted text: ${doc.extractedText || 'Not available'}
Summary: ${doc.summary || 'Not available'}

Answer questions about this document concisely. Conversation so far:
${history.map(m => `${m.role === 'user' ? 'User' : 'Assistant'}: ${m.content}`).join('\n')}`;

    const reply = await callClaude([{ role: 'user', content: context }], 600);
    history.push({ role: 'ai', content: reply });
    msgs.innerHTML = `<div class="msg ai">Hi! I've read this document. Ask me anything about it.</div>` +
      history.map(m => `<div class="msg ${m.role}">${m.content}</div>`).join('');
    msgs.scrollTop = msgs.scrollHeight;
  } catch (err) {
    const dot = document.getElementById('typing-dot');
    if (dot) dot.textContent = 'Error: ' + err.message;
  }
}

function showProc(t, s) { pt.textContent = t; ps.textContent = s; proc.classList.add('show'); }
function hideProc() { proc.classList.remove('show'); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
